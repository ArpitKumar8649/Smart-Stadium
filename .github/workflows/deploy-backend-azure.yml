name: Deploy backend to Azure App Service
# A change to this workflow intentionally triggers the first Azure deployment.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'data/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend-azure.yml'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    # Keeps the initial repository push safe: the job is skipped until the
    # non-secret Azure resource variables are configured in GitHub.
    if: >-
      vars.AZURE_RESOURCE_GROUP != '' &&
      vars.AZURE_WEBAPP_NAME != '' &&
      vars.ALLOWED_ORIGINS != ''
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install build dependencies
        run: npm ci

      - name: Build shared package and backend
        run: |
          npm run build --workspace=shared
          npm run build --workspace=backend

      - name: Test backend
        run: npm run test --workspace=shared --workspace=backend --if-present

      - name: Assemble the production deployment package
        run: |
          mkdir -p deployment/backend deployment/shared
          cp package.json package-lock.json deployment/
          cp backend/package.json deployment/backend/
          cp -R backend/dist deployment/backend/dist
          cp shared/package.json deployment/shared/
          cp -R shared/dist deployment/shared/dist
          cp -R data deployment/data
          node -e "const fs = require('node:fs'); const path = 'deployment/package.json'; const pkg = JSON.parse(fs.readFileSync(path, 'utf8')); pkg.workspaces = ['shared', 'backend']; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\\n');"
          npm ci --prefix deployment --omit=dev

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-deployment
          path: deployment
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deployment
          path: backend-deployment

      - name: Sign in to Azure using OpenID Connect
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure application settings
        run: |
          # Always On is unavailable on the current App Service plan. The API
          # still runs normally; it may simply cold-start after a period idle.
          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings NODE_ENV=production SCM_DO_BUILD_DURING_DEPLOYMENT=false ALLOWED_ORIGINS="$ALLOWED_ORIGINS"

      - name: Set the backend startup command
        run: |
          az webapp config set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --startup-file "node backend/dist/server.js"

      - name: Enable WebSockets for live captions
        run: |
          # Kept separate from Always On: this App Service plan rejects Always
          # On, but WebSockets are required for /api/audio/asr.
          az webapp config set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --web-sockets-enabled true

      - name: Deploy the built backend to Azure Web App
        uses: azure/webapps-deploy@145a0687697df1d8a28909569f6e5d86213041f9 # v3.0.0
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend-deployment
