name: Deploy frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'firebase.json'
      - '.github/workflows/deploy-frontend-firebase.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared API contracts
        run: npm run build --workspace=shared

      - name: Test backend contracts before frontend deployment
        run: npm run test --workspace=backend

      - name: Build the production frontend
        env:
          # Vite embeds VITE_* values in the browser bundle. These must be
          # public values, never server credentials or private API keys.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_CESIUM_ION_TOKEN: ${{ vars.VITE_CESIUM_ION_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          test -n "$VITE_FIREBASE_API_KEY" || { echo "VITE_FIREBASE_API_KEY is not set"; exit 1; }
          test -n "$VITE_FIREBASE_AUTH_DOMAIN" || { echo "VITE_FIREBASE_AUTH_DOMAIN is not set"; exit 1; }
          test -n "$VITE_FIREBASE_PROJECT_ID" || { echo "VITE_FIREBASE_PROJECT_ID is not set"; exit 1; }
          npm run build --workspace=frontend

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a # v0.9.0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

      - name: Smoke-test hosted app, hashed entry module, and Azure SSE
        env:
          FRONTEND_ORIGIN: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app
          API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          set -euo pipefail
          cache_bust="?release=${GITHUB_SHA}"
          html=$(curl --fail --silent --show-error "$FRONTEND_ORIGIN/$cache_bust")
          entry=$(printf '%s' "$html" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -n 1)
          test -n "$entry"
          entry_headers=$(curl --fail --silent --show-error --head "$FRONTEND_ORIGIN$entry$cache_bust" | tr -d '\r')
          printf '%s\n' "$entry_headers" | grep --ignore-case '^content-type: text/javascript' >/dev/null
          curl --fail --silent --show-error --head "$FRONTEND_ORIGIN/navigate$cache_bust" >/dev/null
          health_headers=$(curl --fail --silent --show-error --dump-header - --output /dev/null \
            --header "Origin: $FRONTEND_ORIGIN" "$API_BASE/api/health" | tr -d '\r')
          printf '%s\n' "$health_headers" | grep --fixed-strings --ignore-case "access-control-allow-origin: $FRONTEND_ORIGIN" >/dev/null
          sse_headers=$(timeout 25 curl --silent --show-error --no-buffer --dump-header - --output /dev/null \
            --header 'Accept: text/event-stream' \
            --header 'Cache-Control: no-cache' \
            --header "Origin: $FRONTEND_ORIGIN" "$API_BASE/api/alerts/stream" || test $? -eq 124)
          printf '%s\n' "$sse_headers" | tr -d '\r' | grep --ignore-case '^content-type: text/event-stream' >/dev/null
          printf '%s\n' "$sse_headers" | tr -d '\r' | grep --fixed-strings --ignore-case "access-control-allow-origin: $FRONTEND_ORIGIN" >/dev/null
