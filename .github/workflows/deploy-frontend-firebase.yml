name: Deploy frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'firebase.json'
      - '.github/workflows/deploy-frontend-firebase.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  build-and-deploy:
    # Keep the first repository push safe: configure the Firebase project and
    # public Azure API URL in GitHub before this job can run.
    if: >-
      vars.FIREBASE_PROJECT_ID != '' &&
      vars.VITE_API_BASE != ''
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared API contracts
        run: npm run build --workspace=shared

      - name: Test backend contracts before frontend deployment
        run: npm run test --workspace=backend

      - name: Build the production frontend
        env:
          # Vite embeds VITE_* values in the browser bundle. These must be
          # public values, never server credentials or private API keys.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_CESIUM_ION_TOKEN: ${{ vars.VITE_CESIUM_ION_TOKEN }}
        run: |
          npm run build --workspace=frontend

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

      - name: Smoke-test hosted app and Azure CORS
        env:
          FRONTEND_ORIGIN: https://${{ vars.FIREBASE_PROJECT_ID }}.web.app
          API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --head "$FRONTEND_ORIGIN/navigate" >/dev/null
          headers=$(curl --fail --silent --show-error --dump-header - --output /dev/null \
            --header "Origin: $FRONTEND_ORIGIN" "$API_BASE/api/health" | tr -d '\r')
          printf '%s\n' "$headers" | grep --fixed-strings --ignore-case "access-control-allow-origin: $FRONTEND_ORIGIN" >/dev/null
          printf '%s\n' "$headers" | grep --fixed-strings --ignore-case 'access-control-allow-credentials: true' >/dev/null
