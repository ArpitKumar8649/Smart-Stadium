name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit NPM dependencies
        run: |
          npm audit --audit-level=high
          npm audit --audit-level=high -w frontend
          npm audit --audit-level=high -w backend

      - name: Build shared (types the other workspaces import)
        run: npm run build -w shared

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npx eslint backend/src shared/src frontend/src scripts

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Frontend unit coverage
        run: npm run test:coverage -w frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser end-to-end tests
        run: npm run test:e2e -w frontend

      - name: Build frontend
        run: npm run build -w frontend

      - name: Verify client bundle excludes server credentials
        run: |
          if grep -R -E --binary-files=text 'ADMIN_DEMO_TOKEN|playwright-local-admin-token|concourse-local-admin' frontend/dist; then
            echo 'Server-side admin credential marker found in the browser bundle.' >&2
            exit 1
          fi

      - name: Build backend
        run: npm run build -w backend

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@d6ce0f82c3dd0ffbd75a703f19b589e71f52ce68 # v3.83.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          category: "/language:javascript-typescript"
